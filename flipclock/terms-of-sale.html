<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PomodoroClock Terms of Sale</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f3ee;
      color: #161311;
      line-height: 1.65;
    }
    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 20px 72px;
    }
    h1, h2 {
      line-height: 1.2;
      margin-top: 0;
    }
    h2 {
      margin-top: 32px;
    }
    .meta {
      color: #6d6259;
      font-size: 14px;
    }
    .lang-switcher {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 0 0 28px;
      font-size: 14px;
    }
    .lang-switcher a {
      color: #8d4315;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <nav class="lang-switcher" id="lang-switcher"></nav>
    <h1 id="page-title"></h1>
    <p class="meta" id="last-updated"></p>

    <h2 id="overview-title"></h2>
    <p id="overview-body"></p>

    <h2 id="purchase-title"></h2>
    <p id="purchase-body"></p>

    <h2 id="payment-title"></h2>
    <p id="payment-body"></p>

    <h2 id="refund-title"></h2>
    <p id="refund-body"></p>

    <h2 id="subscription-title"></h2>
    <p id="subscription-body"></p>

    <h2 id="changes-title"></h2>
    <p id="changes-body"></p>

    <h2 id="contact-title"></h2>
    <p id="contact-body"></p>
  </main>
  <script>
    const translations = {
      en: {
        pageTitle: "PomodoroClock Terms of Sale",
        lastUpdated: "Last updated: 2026-03-18",
        overviewTitle: "Overview",
        overviewBody: "These Terms of Sale govern the purchase and use of any paid features, subscriptions, or virtual goods within the PomodoroClock app. By making a purchase, you agree to these terms.",
        purchaseTitle: "Purchases",
        purchaseBody: "PomodoroClock offers optional in-app purchases including premium themes, additional sound packs, and subscription plans. All purchases are final and non-refundable unless required by law. Prices are displayed in your local currency and include applicable taxes where required.",
        paymentTitle: "Payment",
        paymentBody: "Payments are processed securely through Apple's App Store. Your payment information is handled by Apple, not by PomodoroClock. By completing a purchase, you agree to Apple's Terms and Conditions for App Store purchases.",
        refundTitle: "Refunds",
        refundBody: "All purchases are final. Refunds are not available after a purchase is completed, except as required by applicable consumer protection laws. To request a refund, please contact Apple directly through their support channels.",
        subscriptionTitle: "Subscriptions",
        subscriptionBody: "If you subscribe to premium features, your subscription will automatically renew unless auto-renew is turned off at least 24 hours before the end of the current period. You can manage or cancel subscriptions through your Apple ID settings. Any unused portion of a free trial period will be forfeited when you purchase a subscription.",
        changesTitle: "Changes to Terms",
        changesBody: "We reserve the right to modify these terms at any time. Continued use of purchased features after changes constitutes acceptance of the new terms.",
        contactTitle: "Contact",
        contactBody: "For questions about these terms, contact: govomusic@gmail.com"
      },
      zh: {
        pageTitle: "番茄钟购买条款",
        lastUpdated: "最后更新：2026-03-18",
        overviewTitle: "概述",
        overviewBody: "本购买条款管辖番茄钟应用中任何付费功能、订阅或虚拟商品的购买和使用。完成购买即表示您同意这些条款。",
        purchaseTitle: "购买",
        purchaseBody: "番茄钟提供可选的应用内购买，包括高级主题、额外音效包和订阅计划。除法律另有规定外，所有购买均为最终购买，不可退款。价格以您的本地货币显示，并包含适用税费。",
        paymentTitle: "支付",
        paymentBody: "支付通过 Apple App Store 安全处理。您的支付信息由 Apple 处理，而非番茄钟。完成购买即表示您同意 Apple 的 App Store 购买条款和条件。",
        refundTitle: "退款",
        refundBody: "所有购买均为最终购买。购买完成后不可退款，除非适用消费者保护法律另有要求。退款请联系 Apple 客服。",
        subscriptionTitle: "订阅",
        subscriptionBody: "如果您订阅高级功能，除非在当前期限结束前至少 24 小时关闭自动续订，否则订阅将自动续订。您可以通过 Apple ID 设置管理或取消订阅。购买订阅时，免费试用期的任何未使用部分将被作废。",
        changesTitle: "条款变更",
        changesBody: "我们保留随时修改这些条款的权利。在更改后继续使用已购买的功能即表示接受新条款。",
        contactTitle: "联系方式",
        contactBody: "如有疑问，请联系：govomusic@gmail.com"
      }
    };

    const params = new URLSearchParams(window.location.search);
    const requested = (params.get("lang") || params.get("lan") || "en").toLowerCase();
    const locale = translations[requested] ? requested : "en";
    const t = translations[locale];

    document.documentElement.lang = locale;
    document.title = t.pageTitle;
    document.getElementById("page-title").textContent = t.pageTitle;
    document.getElementById("last-updated").textContent = t.lastUpdated;
    document.getElementById("overview-title").textContent = t.overviewTitle;
    document.getElementById("overview-body").textContent = t.overviewBody;
    document.getElementById("purchase-title").textContent = t.purchaseTitle;
    document.getElementById("purchase-body").textContent = t.purchaseBody;
    document.getElementById("payment-title").textContent = t.paymentTitle;
    document.getElementById("payment-body").textContent = t.paymentBody;
    document.getElementById("refund-title").textContent = t.refundTitle;
    document.getElementById("refund-body").textContent = t.refundBody;
    document.getElementById("subscription-title").textContent = t.subscriptionTitle;
    document.getElementById("subscription-body").textContent = t.subscriptionBody;
    document.getElementById("changes-title").textContent = t.changesTitle;
    document.getElementById("changes-body").textContent = t.changesBody;
    document.getElementById("contact-title").textContent = t.contactTitle;
    document.getElementById("contact-body").textContent = t.contactBody;

    const switcher = document.getElementById("lang-switcher");
    const labels = { en: "English", zh: "简体中文" };
    Object.keys(translations).forEach((key) => {
      const link = document.createElement("a");
      link.href = `?lang=${key}`;
      link.textContent = labels[key] || key;
      switcher.appendChild(link);
    });
  </script>
</body>
</html>
