<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务条款 - 番茄钟 PomodoroClock</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 640px;
            width: 100%;
        }

        .card {
            background: rgba(30, 30, 30, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .lang-switch {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-bottom: 14px;
        }

        .lang-link {
            font-size: 12px;
            color: #888;
            text-decoration: none;
            padding: 6px 10px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
        }

        .lang-link.active {
            color: white;
            background: #ff9a52;
        }

        .logo {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            margin-bottom: 10px;
        }

        .logo-text {
            font-size: 28px;
            font-weight: 600;
            background: linear-gradient(135deg, #ff9a52, #ffb347);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .title {
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            color: #f4efe7;
            margin-bottom: 24px;
        }

        .section {
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #f4efe7;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 16px;
            background: linear-gradient(180deg, #ff9a52, #ffb347);
            border-radius: 2px;
        }

        .section-content {
            color: #a89f94;
            font-size: 14px;
            line-height: 1.65;
            padding-left: 12px;
        }

        .section-content p + p {
            margin-top: 8px;
        }

        .section-content ul {
            margin-top: 8px;
            padding-left: 20px;
        }

        .section-content li + li {
            margin-top: 6px;
        }

        .section-content a {
            color: #ff9a52;
            text-decoration: none;
        }

        .section-content a:hover {
            text-decoration: underline;
        }

        .contact-box {
            background: linear-gradient(135deg, #ff9a52, #ffb347);
            border-radius: 20px;
            padding: 26px;
            text-align: center;
            margin: 28px 0;
            box-shadow: 0 10px 30px rgba(255, 154, 82, 0.3);
        }

        .contact-icon {
            font-size: 40px;
            margin-bottom: 12px;
        }

        .contact-title {
            font-size: 18px;
            font-weight: 600;
            color: white;
            margin-bottom: 12px;
        }

        .contact-email {
            font-size: 20px;
            font-weight: 600;
            color: white;
            text-decoration: none;
            display: inline-block;
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 12px;
        }

        .footer {
            text-align: center;
            color: #666;
            font-size: 12px;
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            line-height: 1.6;
            word-break: break-word;
        }

        .footer a {
            color: #888;
        }

        @media (max-width: 480px) {
            .card {
                padding: 28px 20px;
            }

            .logo-text {
                font-size: 24px;
            }

            .title {
                font-size: 18px;
            }

            .contact-email {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="lang-switch">
                <a id="switch-zh" class="lang-link" href="?lan=zh">中文</a>
                <a id="switch-en" class="lang-link" href="?lan=en">EN</a>
            </div>

            <div class="section">

        </div>
    </div>

            document.getElementById('contact-title').textContent = t.contactTitle;

    </script>
</body>
</html>
